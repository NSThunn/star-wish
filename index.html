<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tiny Night Sky ✨</title>
    <style>
        :root {
            --sky-top: #0b1e3b;
            --sky-bottom: #2d1b4e;
            --pastel-pink: #ffd1dc;
            --pastel-purple: #b39ddb;
            --gold: #fff9c4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }

        body {
            overflow: hidden;
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
            height: 100vh;
            width: 100vw;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* --- Layers --- */
        #star-layer, #wish-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }

        /* --- Moon --- */
        #moon {
            position: absolute;
            width: 80px; height: 80px;
            background: #fefcd7;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(254, 252, 215, 0.8);
            cursor: grab;
            z-index: 10;
        }

        /* --- BACKGROUND STARS (Circles) --- */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--t) ease-in-out infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* --- WISH STAR (New Sparkle Shape) --- */
        .wish-star-container {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: appear 1s ease-out forwards, pulse 3s infinite ease-in-out;
        }
        .wish-star {
            position: absolute;
            background: white;
            /* This creates a sharp 4-pointed star shape */
            clip-path: polygon(50% 0%, 55% 45%, 100% 50%, 55% 55%, 50% 100%, 45% 55%, 0% 50%, 45% 45%);
            animation: wish-twinkle 2s ease-in-out infinite;
            box-shadow: 0 0 5px white;
        }

        /* The horizontal and vertical beams of the star */
        .wish-star-container::before, 
        .wish-star-container::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white;
        }

        /* Vertical Beam */
        .wish-star-container::before {
            width: 2px;
            height: 100%;
        }

        /* Horizontal Beam */
        .wish-star-container::after {
            width: 100%;
            height: 2px;
        }

        @keyframes appear {
            from { transform: scale(0) rotate(-45deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(1.4); }
        }

        /* --- UI & Clouds --- */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            filter: blur(10px);
            animation: drift linear infinite;
        }
        @keyframes drift {
            from { transform: translateX(-200px); }
            to { transform: translateX(calc(100vw + 200px)); }
        }

        #ui-container {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 100;
        }

        button {
            padding: 15px 30px; border-radius: 30px; border: none;
            background: white; color: #2d1b4e; cursor: pointer;
            font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #wish-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: 20px;
            width: 90%; max-width: 400px; color: #333; text-align: center; z-index: 1000;
        }

        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 2px solid var(--pastel-purple); }

        #power-bar-container { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin-bottom: 15px; overflow: hidden; }
        #power-bar { height: 100%; width: 0%; background: var(--pastel-purple); transition: width 0.3s; }

        .shooting-star {
            position: absolute; width: 4px; height: 4px; background: white; border-radius: 50%;
            box-shadow: 0 0 10px white;
        }
    </style>
</head>
<body>

    <div id="star-layer"></div>
    <div id="wish-layer"></div>
    <div id="moon"></div>

    <div id="ui-container">
        <button onclick="openWishModal()">✨ Make a Wish</button>
    </div>

    <div id="wish-modal">
        <h3>What do you wish for?</h3>
        <input type="text" id="wish-input" placeholder="Type your heart out..." maxlength="100">
        <div id="power-bar-container"><div id="power-bar"></div></div>
        <button onclick="submitWish()" style="background: var(--pastel-purple); color: white;">Send to Sky</button>
        <button onclick="closeWishModal()" style="background: transparent; color: #999; box-shadow: none;">cancel</button>
    </div>

    <script>
        const starLayer = document.getElementById('star-layer');
        const wishLayer = document.getElementById('wish-layer');
        const moon = document.getElementById('moon');
        const wishInput = document.getElementById('wish-input');
        const powerBar = document.getElementById('power-bar');

        // Create Background Stars
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3;
            star.style.width = size + 'px'; star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--t', (2 + Math.random() * 4) + 's');
            starLayer.appendChild(star);
        }

        // Draggable Moon
        let isDragging = false;
        const moveMoon = (e) => {
            if (!isDragging) return;
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - 40;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - 40;
            moon.style.left = x + 'px'; moon.style.top = y + 'px';
        };
        moon.addEventListener('mousedown', () => isDragging = true);
        moon.addEventListener('touchstart', () => isDragging = true);
        window.addEventListener('mousemove', moveMoon);
        window.addEventListener('touchmove', moveMoon);
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchend', () => isDragging = false);
        moon.style.left = '70%'; moon.style.top = '15%';

        // Wish Interaction
        function openWishModal() { document.getElementById('wish-modal').style.display = 'block'; wishInput.focus(); }
        function closeWishModal() { document.getElementById('wish-modal').style.display = 'none'; wishInput.value = ''; powerBar.style.width = '0%'; }

        wishInput.addEventListener('input', () => {
            powerBar.style.width = (wishInput.value.length / 100) * 100 + '%';
        });

        function submitWish() {
            const text = wishInput.value;
            if (!text) return;

            const wishStar = document.createElement('div');
            wishStar.className = 'wish-star-container';
            
            // Size scales with wish length
            const size = 8 + (text.length / 10);
            wishStar.style.width = size + 'px';
            wishStar.style.height = size + 'px';
            
            wishStar.style.left = (10 + Math.random() * 70) + '%';
            wishStar.style.top = (10 + Math.random() * 50) + '%';
            
            wishLayer.appendChild(wishStar);
            closeWishModal();
        }

        // Shooting Stars
        function spawnShootingStar() {
            const s = document.createElement('div');
            s.className = 'shooting-star';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.top = Math.random() * 50 + 'vh';
            document.body.appendChild(s);
            const anim = s.animate([
                { transform: 'translate(0, 0)', opacity: 1 },
                { transform: 'translate(-300px, 300px)', opacity: 0 }
            ], { duration: 2000 });
            anim.onfinish = () => s.remove();
        }
        setInterval(spawnShootingStar, 5000);

        // Clouds
        for(let i=0; i<4; i++) {
            const c = document.createElement('div');
            c.className = 'cloud';
            c.style.width = (Math.random() * 150 + 150) + 'px';
            c.style.height = '45px';
            c.style.top = (Math.random() * 80) + '%';
            c.style.left = '-250px';
            c.style.animationDuration = (Math.random() * 40 + 40) + 's';
            document.body.appendChild(c);
        }
    </script>
</body>
</html>
